naftiko: 1.0.0-alpha2
info:
  label: WhatsApp Cloud API — QR Codes
  description: 'WhatsApp Cloud API — QR Codes. 5 operations. Lead operation: WhatsApp Create QR Code. Self-contained Naftiko
    capability covering one Whatsapp business surface.'
  tags:
  - Whatsapp
  - QR Codes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WHATSAPP_API_KEY: WHATSAPP_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-qr-codes
    baseUri: https://graph.facebook.com/v21.0
    description: WhatsApp Cloud API — QR Codes business capability. Self-contained, no shared references.
    resources:
    - name: phone-number-id-message_qrdls
      path: /{phone-number-id}/message_qrdls
      operations:
      - name: createqrcode
        method: POST
        description: WhatsApp Create QR Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listqrcodes
        method: GET
        description: WhatsApp List QR Codes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: phone-number-id-message_qrdls-qr-code-id
      path: /{phone-number-id}/message_qrdls/{qr-code-id}
      operations:
      - name: getqrcode
        method: GET
        description: WhatsApp Get QR Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateqrcode
        method: POST
        description: WhatsApp Update QR Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteqrcode
        method: DELETE
        description: WhatsApp Delete QR Code
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.WHATSAPP_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-qr-codes-rest
    port: 8080
    description: REST adapter for WhatsApp Cloud API — QR Codes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/{phone-number-id}/message-qrdls
      name: phone-number-id-message-qrdls
      description: REST surface for phone-number-id-message_qrdls.
      operations:
      - method: POST
        name: createqrcode
        description: WhatsApp Create QR Code
        call: cloud-qr-codes.createqrcode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: listqrcodes
        description: WhatsApp List QR Codes
        call: cloud-qr-codes.listqrcodes
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/{phone-number-id}/message-qrdls/{qr-code-id}
      name: phone-number-id-message-qrdls-qr-code-id
      description: REST surface for phone-number-id-message_qrdls-qr-code-id.
      operations:
      - method: GET
        name: getqrcode
        description: WhatsApp Get QR Code
        call: cloud-qr-codes.getqrcode
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateqrcode
        description: WhatsApp Update QR Code
        call: cloud-qr-codes.updateqrcode
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteqrcode
        description: WhatsApp Delete QR Code
        call: cloud-qr-codes.deleteqrcode
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-qr-codes-mcp
    port: 9090
    transport: http
    description: MCP adapter for WhatsApp Cloud API — QR Codes. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: whatsapp-create-qr-code
      description: WhatsApp Create QR Code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-qr-codes.createqrcode
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-list-qr-codes
      description: WhatsApp List QR Codes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-qr-codes.listqrcodes
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-get-qr-code
      description: WhatsApp Get QR Code
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cloud-qr-codes.getqrcode
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-update-qr-code
      description: WhatsApp Update QR Code
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-qr-codes.updateqrcode
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-delete-qr-code
      description: WhatsApp Delete QR Code
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: cloud-qr-codes.deleteqrcode
      outputParameters:
      - type: object
        mapping: $.
