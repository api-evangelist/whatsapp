naftiko: 1.0.0-alpha2
info:
  label: WhatsApp Cloud API — Two-Step Verification
  description: 'WhatsApp Cloud API — Two-Step Verification. 1 operations. Lead operation: WhatsApp Set Two-step Verification
    PIN. Self-contained Naftiko capability covering one Whatsapp business surface.'
  tags:
  - Whatsapp
  - Two-Step Verification
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WHATSAPP_API_KEY: WHATSAPP_API_KEY
capability:
  consumes:
  - type: http
    namespace: cloud-two-step-verification
    baseUri: https://graph.facebook.com/v21.0
    description: WhatsApp Cloud API — Two-Step Verification business capability. Self-contained, no shared references.
    resources:
    - name: phone-number-id
      path: /{phone-number-id}
      operations:
      - name: settwostepverification
        method: POST
        description: WhatsApp Set Two-step Verification PIN
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WHATSAPP_API_KEY}}'
  exposes:
  - type: rest
    namespace: cloud-two-step-verification-rest
    port: 8080
    description: REST adapter for WhatsApp Cloud API — Two-Step Verification. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/{phone-number-id}
      name: phone-number-id
      description: REST surface for phone-number-id.
      operations:
      - method: POST
        name: settwostepverification
        description: WhatsApp Set Two-step Verification PIN
        call: cloud-two-step-verification.settwostepverification
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cloud-two-step-verification-mcp
    port: 9090
    transport: http
    description: MCP adapter for WhatsApp Cloud API — Two-Step Verification. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: whatsapp-set-two-step-verification
      description: WhatsApp Set Two-step Verification PIN
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: cloud-two-step-verification.settwostepverification
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
