naftiko: "1.0.0-alpha1"

info:
  label: "WhatsApp Flows And Automation"
  description: "Unified workflow for creating and managing interactive flows, publishing lifecycle management, and webhook subscriptions. Combines Flows API and Business Management API webhook capabilities used by developers building guided conversational experiences and automation integrations."
  tags:
    - WhatsApp
    - Flows
    - Automation
    - Webhooks
    - Interactive Experiences
    - Conversational Design
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      WHATSAPP_ACCESS_TOKEN: WHATSAPP_ACCESS_TOKEN

capability:
  consumes:
    - import: whatsapp-flows
      location: ./shared/flows.yaml
    - import: whatsapp-business-mgmt
      location: ./shared/business-management.yaml

  exposes:
    - type: rest
      port: 8083
      namespace: whatsapp-flows-automation-api
      description: "Unified REST API for WhatsApp flows, lifecycle management, and webhook subscriptions."
      resources:
        - path: /v1/flows
          name: flows
          description: "Flow management."
          operations:
            - method: GET
              name: list-flows
              description: "Lists all flows for a WABA."
              call: "whatsapp-flows.list-flows"
              with:
                waba_id: "rest.waba_id"
                fields: "rest.fields"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-flow
              description: "Creates a new flow."
              call: "whatsapp-flows.create-flow"
              with:
                waba_id: "rest.waba_id"
                name: "rest.name"
                categories: "rest.categories"
                clone_flow_id: "rest.clone_flow_id"
                endpoint_uri: "rest.endpoint_uri"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/flows/{flow_id}
          name: flow
          description: "Individual flow management."
          operations:
            - method: GET
              name: get-flow
              description: "Retrieves details about a flow."
              call: "whatsapp-flows.get-flow"
              with:
                flow_id: "rest.flow_id"
                fields: "rest.fields"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: update-flow
              description: "Updates a draft flow."
              call: "whatsapp-flows.update-flow"
              with:
                flow_id: "rest.flow_id"
                name: "rest.name"
                categories: "rest.categories"
                endpoint_uri: "rest.endpoint_uri"
                application_id: "rest.application_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-flow
              description: "Deletes a draft flow."
              call: "whatsapp-flows.delete-flow"
              with:
                flow_id: "rest.flow_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/flows/{flow_id}/assets
          name: flow-assets
          description: "Flow JSON assets."
          operations:
            - method: GET
              name: get-flow-assets
              description: "Retrieves flow assets."
              call: "whatsapp-flows.get-flow-assets"
              with:
                flow_id: "rest.flow_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: upload-flow-json
              description: "Uploads flow JSON definition."
              call: "whatsapp-flows.upload-flow-json"
              with:
                flow_id: "rest.flow_id"
                file: "rest.file"
                name: "rest.name"
                asset_type: "rest.asset_type"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/flows/{flow_id}/publish
          name: flow-publish
          description: "Publish a flow."
          operations:
            - method: POST
              name: publish-flow
              description: "Publishes a draft flow."
              call: "whatsapp-flows.publish-flow"
              with:
                flow_id: "rest.flow_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/flows/{flow_id}/deprecate
          name: flow-deprecate
          description: "Deprecate a flow."
          operations:
            - method: POST
              name: deprecate-flow
              description: "Deprecates a published flow."
              call: "whatsapp-flows.deprecate-flow"
              with:
                flow_id: "rest.flow_id"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/webhook-subscriptions
          name: webhook-subscriptions
          description: "Webhook subscription management."
          operations:
            - method: GET
              name: list-subscribed-apps
              description: "Lists webhook subscriptions."
              call: "whatsapp-business-mgmt.list-subscribed-apps"
              with:
                waba_id: "rest.waba_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: subscribe-app
              description: "Subscribes app to webhooks."
              call: "whatsapp-business-mgmt.subscribe-app"
              with:
                waba_id: "rest.waba_id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: unsubscribe-app
              description: "Unsubscribes app from webhooks."
              call: "whatsapp-business-mgmt.unsubscribe-app"
              with:
                waba_id: "rest.waba_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9093
      namespace: whatsapp-flows-automation-mcp
      transport: http
      description: "MCP server for AI-assisted WhatsApp flow creation, lifecycle management, and webhook automation."
      tools:
        - name: list-flows
          description: "Lists all flows for a WhatsApp Business Account."
          hints:
            readOnly: true
            idempotent: true
          call: "whatsapp-flows.list-flows"
          with:
            waba_id: "tools.waba_id"
            fields: "tools.fields"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-flow
          description: "Creates a new interactive flow. Supports appointment booking, surveys, lead capture, and other guided experiences."
          hints:
            readOnly: false
            destructive: false
          call: "whatsapp-flows.create-flow"
          with:
            waba_id: "tools.waba_id"
            name: "tools.name"
            categories: "tools.categories"
            clone_flow_id: "tools.clone_flow_id"
            endpoint_uri: "tools.endpoint_uri"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-flow
          description: "Retrieves details about a specific flow including status, categories, and validation errors."
          hints:
            readOnly: true
            idempotent: true
          call: "whatsapp-flows.get-flow"
          with:
            flow_id: "tools.flow_id"
            fields: "tools.fields"
          outputParameters:
            - type: object
              mapping: "$."

        - name: update-flow
          description: "Updates a draft flow. Only DRAFT flows can be updated; published flows must be cloned."
          hints:
            readOnly: false
            idempotent: true
          call: "whatsapp-flows.update-flow"
          with:
            flow_id: "tools.flow_id"
            name: "tools.name"
            categories: "tools.categories"
            endpoint_uri: "tools.endpoint_uri"
            application_id: "tools.application_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-flow
          description: "Deletes a draft flow. Only DRAFT flows can be deleted; published flows must be deprecated."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "whatsapp-flows.delete-flow"
          with:
            flow_id: "tools.flow_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-flow-assets
          description: "Retrieves the flow JSON assets including download URLs."
          hints:
            readOnly: true
            idempotent: true
          call: "whatsapp-flows.get-flow-assets"
          with:
            flow_id: "tools.flow_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: upload-flow-json
          description: "Uploads or replaces the flow JSON definition file. The file is validated on upload."
          hints:
            readOnly: false
            destructive: false
          call: "whatsapp-flows.upload-flow-json"
          with:
            flow_id: "tools.flow_id"
            file: "tools.file"
            name: "tools.name"
            asset_type: "tools.asset_type"
          outputParameters:
            - type: object
              mapping: "$."

        - name: publish-flow
          description: "Publishes a draft flow, making it available for use in messages. Requires valid flow JSON with no errors."
          hints:
            readOnly: false
            destructive: false
          call: "whatsapp-flows.publish-flow"
          with:
            flow_id: "tools.flow_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: deprecate-flow
          description: "Deprecates a published flow. Deprecated flows remain in history but cannot be sent to customers."
          hints:
            readOnly: false
            destructive: true
          call: "whatsapp-flows.deprecate-flow"
          with:
            flow_id: "tools.flow_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-subscribed-apps
          description: "Lists all apps subscribed to webhook events for a WABA."
          hints:
            readOnly: true
            idempotent: true
          call: "whatsapp-business-mgmt.list-subscribed-apps"
          with:
            waba_id: "tools.waba_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: subscribe-app
          description: "Subscribes the current app to receive webhook events for a WABA."
          hints:
            readOnly: false
            destructive: false
          call: "whatsapp-business-mgmt.subscribe-app"
          with:
            waba_id: "tools.waba_id"
          outputParameters:
            - type: object
              mapping: "$."

        - name: unsubscribe-app
          description: "Unsubscribes the current app from webhook events."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "whatsapp-business-mgmt.unsubscribe-app"
          with:
            waba_id: "tools.waba_id"
          outputParameters:
            - type: object
              mapping: "$."
