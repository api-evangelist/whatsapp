naftiko: 1.0.0-alpha2
info:
  label: WhatsApp Business Management API — Product Catalogs
  description: 'WhatsApp Business Management API — Product Catalogs. 3 operations. Lead operation: WhatsApp List Product Catalogs.
    Self-contained Naftiko capability covering one Whatsapp business surface.'
  tags:
  - Whatsapp
  - Product Catalogs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WHATSAPP_API_KEY: WHATSAPP_API_KEY
capability:
  consumes:
  - type: http
    namespace: business-management-product-catalogs
    baseUri: https://graph.facebook.com/v21.0
    description: WhatsApp Business Management API — Product Catalogs business capability. Self-contained, no shared references.
    resources:
    - name: waba-id-product_catalogs
      path: /{waba-id}/product_catalogs
      operations:
      - name: listproductcatalogs
        method: GET
        description: WhatsApp List Product Catalogs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: connectproductcatalog
        method: POST
        description: WhatsApp Connect Product Catalog
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: disconnectproductcatalog
        method: DELETE
        description: WhatsApp Disconnect Product Catalog
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WHATSAPP_API_KEY}}'
  exposes:
  - type: rest
    namespace: business-management-product-catalogs-rest
    port: 8080
    description: REST adapter for WhatsApp Business Management API — Product Catalogs. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/{waba-id}/product-catalogs
      name: waba-id-product-catalogs
      description: REST surface for waba-id-product_catalogs.
      operations:
      - method: GET
        name: listproductcatalogs
        description: WhatsApp List Product Catalogs
        call: business-management-product-catalogs.listproductcatalogs
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: connectproductcatalog
        description: WhatsApp Connect Product Catalog
        call: business-management-product-catalogs.connectproductcatalog
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: disconnectproductcatalog
        description: WhatsApp Disconnect Product Catalog
        call: business-management-product-catalogs.disconnectproductcatalog
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: business-management-product-catalogs-mcp
    port: 9090
    transport: http
    description: MCP adapter for WhatsApp Business Management API — Product Catalogs. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: whatsapp-list-product-catalogs
      description: WhatsApp List Product Catalogs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: business-management-product-catalogs.listproductcatalogs
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-connect-product-catalog
      description: WhatsApp Connect Product Catalog
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: business-management-product-catalogs.connectproductcatalog
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-disconnect-product-catalog
      description: WhatsApp Disconnect Product Catalog
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: business-management-product-catalogs.disconnectproductcatalog
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
