naftiko: 1.0.0-alpha2
info:
  label: WhatsApp Flows API — Assets
  description: 'WhatsApp Flows API — Assets. 2 operations. Lead operation: WhatsApp Get Flow Assets. Self-contained Naftiko
    capability covering one Whatsapp business surface.'
  tags:
  - Whatsapp
  - Assets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    WHATSAPP_API_KEY: WHATSAPP_API_KEY
capability:
  consumes:
  - type: http
    namespace: flows-assets
    baseUri: https://graph.facebook.com/v21.0
    description: WhatsApp Flows API — Assets business capability. Self-contained, no shared references.
    resources:
    - name: flow-id-assets
      path: /{flow-id}/assets
      operations:
      - name: getflowassets
        method: GET
        description: WhatsApp Get Flow Assets
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: uploadflowjson
        method: POST
        description: WhatsApp Upload Flow JSON
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.WHATSAPP_API_KEY}}'
  exposes:
  - type: rest
    namespace: flows-assets-rest
    port: 8080
    description: REST adapter for WhatsApp Flows API — Assets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/{flow-id}/assets
      name: flow-id-assets
      description: REST surface for flow-id-assets.
      operations:
      - method: GET
        name: getflowassets
        description: WhatsApp Get Flow Assets
        call: flows-assets.getflowassets
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: uploadflowjson
        description: WhatsApp Upload Flow JSON
        call: flows-assets.uploadflowjson
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: flows-assets-mcp
    port: 9090
    transport: http
    description: MCP adapter for WhatsApp Flows API — Assets. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: whatsapp-get-flow-assets
      description: WhatsApp Get Flow Assets
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: flows-assets.getflowassets
      outputParameters:
      - type: object
        mapping: $.
    - name: whatsapp-upload-flow-json
      description: WhatsApp Upload Flow JSON
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: flows-assets.uploadflowjson
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
