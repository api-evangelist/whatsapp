naftiko: 1.0.0-alpha2
info:
  label: WhatsApp Templates And Analytics
  description: Unified workflow for managing message templates and analyzing conversation and template performance. Combines
    Business Management API template CRUD and analytics capabilities used by marketing teams, content managers, and business
    analysts.
  tags:
  - WhatsApp
  - Message Templates
  - Analytics
  - Marketing
  - Reporting
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    WHATSAPP_ACCESS_TOKEN: WHATSAPP_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: whatsapp-business-mgmt
    baseUri: https://graph.facebook.com/v21.0
    description: WhatsApp Business Management API for managing WABAs, phone numbers, templates, analytics, users, catalogs,
      and webhooks.
    authentication:
      type: bearer
      token: '{{WHATSAPP_ACCESS_TOKEN}}'
    resources:
    - name: business-accounts
      path: /
      description: Manage WhatsApp Business Account information.
      operations:
      - name: get-whatsapp-business-account
        method: GET
        path: /{waba_id}
        description: Retrieves information about a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated list of fields to return
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: phone-numbers
      path: /
      description: List and manage phone numbers on a WABA.
      operations:
      - name: list-phone-numbers
        method: GET
        path: /{waba_id}/phone_numbers
        description: Lists all phone numbers associated with a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated fields to return
        - name: limit
          in: query
          type: integer
          required: false
          description: Pagination limit
        - name: after
          in: query
          type: string
          required: false
          description: Cursor for forward pagination
        - name: before
          in: query
          type: string
          required: false
          description: Cursor for backward pagination
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: message-templates
      path: /
      description: Create, update, and delete message templates.
      operations:
      - name: list-message-templates
        method: GET
        path: /{waba_id}/message_templates
        description: Lists all message templates for a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        - name: fields
          in: query
          type: string
          required: false
          description: Comma-separated fields to return
        - name: limit
          in: query
          type: integer
          required: false
          description: Pagination limit
        - name: after
          in: query
          type: string
          required: false
          description: Cursor for forward pagination
        - name: before
          in: query
          type: string
          required: false
          description: Cursor for backward pagination
        - name: name
          in: query
          type: string
          required: false
          description: Filter by template name
        - name: language
          in: query
          type: string
          required: false
          description: Filter by language code
        - name: status
          in: query
          type: string
          required: false
          description: Filter by approval status (APPROVED, PENDING, REJECTED, PAUSED, DISABLED)
        - name: category
          in: query
          type: string
          required: false
          description: Filter by template category (AUTHENTICATION, MARKETING, UTILITY)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-message-template
        method: POST
        path: /{waba_id}/message_templates
        description: Creates a new message template for a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        body:
          type: json
          data:
            name: '{{tools.name}}'
            language: '{{tools.language}}'
            category: '{{tools.category}}'
            components: '{{tools.components}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-message-template
        method: POST
        path: /{message_template_id}
        description: Updates an existing message template. Only APPROVED or PAUSED templates can be edited.
        inputParameters:
        - name: message_template_id
          in: path
          type: string
          required: true
          description: Message template ID
        body:
          type: json
          data:
            components: '{{tools.components}}'
            category: '{{tools.category}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-message-template
        method: DELETE
        path: /{waba_id}/message_templates
        description: Deletes a message template. Deleting by name removes all language variants.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        - name: name
          in: query
          type: string
          required: true
          description: Template name to delete
        - name: hsm_id
          in: query
          type: string
          required: false
          description: Specific template ID to delete a single language variant
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: analytics
      path: /
      description: Retrieve conversation and template analytics.
      operations:
      - name: get-conversation-analytics
        method: GET
        path: /{waba_id}/conversation_analytics
        description: Retrieves conversation analytics for a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        - name: start
          in: query
          type: string
          required: true
          description: Start time (Unix timestamp or YYYY-MM-DD)
        - name: end
          in: query
          type: string
          required: true
          description: End time (Unix timestamp or YYYY-MM-DD)
        - name: granularity
          in: query
          type: string
          required: true
          description: Time granularity (HALF_HOUR, DAILY, MONTHLY)
        - name: phone_numbers
          in: query
          type: array
          required: false
          description: Filter by phone number IDs
        - name: metric_types
          in: query
          type: array
          required: false
          description: Metric types (CONVERSATION, COST)
        - name: conversation_categories
          in: query
          type: array
          required: false
          description: Conversation categories filter
        - name: dimensions
          in: query
          type: array
          required: false
          description: Dimensions for breakdown
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: get-template-analytics
        method: GET
        path: /{waba_id}/template_analytics
        description: Retrieves analytics for specific message templates.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        - name: start
          in: query
          type: string
          required: true
          description: Start time
        - name: end
          in: query
          type: string
          required: true
          description: End time
        - name: granularity
          in: query
          type: string
          required: true
          description: Time granularity (DAILY)
        - name: template_ids
          in: query
          type: array
          required: true
          description: Template IDs to analyze (max 10)
        - name: metric_types
          in: query
          type: array
          required: false
          description: Metric types (SENT, DELIVERED, READ, CLICKED, COST)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: subscribed-apps
      path: /
      description: Manage webhook subscriptions for a WABA.
      operations:
      - name: list-subscribed-apps
        method: GET
        path: /{waba_id}/subscribed_apps
        description: Lists all apps subscribed to webhook events for this WABA.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: subscribe-app
        method: POST
        path: /{waba_id}/subscribed_apps
        description: Subscribes the current app to receive webhook events for this WABA.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: unsubscribe-app
        method: DELETE
        path: /{waba_id}/subscribed_apps
        description: Unsubscribes the current app from webhook events.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: assigned-users
      path: /
      description: Manage user access to a WABA.
      operations:
      - name: list-assigned-users
        method: GET
        path: /{waba_id}/assigned_users
        description: Lists all users assigned to a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: assign-user
        method: POST
        path: /{waba_id}/assigned_users
        description: Assigns a user with specific tasks to a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        body:
          type: json
          data:
            user: '{{tools.user}}'
            tasks: '{{tools.tasks}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: remove-assigned-user
        method: DELETE
        path: /{waba_id}/assigned_users
        description: Removes a user from a WhatsApp Business Account.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        body:
          type: json
          data:
            user: '{{tools.user}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: product-catalogs
      path: /
      description: Connect and manage product catalogs.
      operations:
      - name: list-product-catalogs
        method: GET
        path: /{waba_id}/product_catalogs
        description: Lists product catalogs connected to a WABA.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: connect-product-catalog
        method: POST
        path: /{waba_id}/product_catalogs
        description: Connects a product catalog to a WABA.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        body:
          type: json
          data:
            catalog_id: '{{tools.catalog_id}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: disconnect-product-catalog
        method: DELETE
        path: /{waba_id}/product_catalogs
        description: Disconnects a product catalog from a WABA.
        inputParameters:
        - name: waba_id
          in: path
          type: string
          required: true
          description: WhatsApp Business Account ID
        body:
          type: json
          data:
            catalog_id: '{{tools.catalog_id}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8082
    namespace: whatsapp-templates-api
    description: Unified REST API for WhatsApp message template management and analytics.
    resources:
    - path: /v1/message-templates
      name: message-templates
      description: Message template management.
      operations:
      - method: GET
        name: list-message-templates
        description: Lists all message templates for a WABA.
        call: whatsapp-business-mgmt.list-message-templates
        with:
          waba_id: rest.waba_id
          fields: rest.fields
          limit: rest.limit
          after: rest.after
          before: rest.before
          name: rest.name
          language: rest.language
          status: rest.status
          category: rest.category
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-message-template
        description: Creates a new message template.
        call: whatsapp-business-mgmt.create-message-template
        with:
          waba_id: rest.waba_id
          name: rest.name
          language: rest.language
          category: rest.category
          components: rest.components
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-message-template
        description: Deletes a message template.
        call: whatsapp-business-mgmt.delete-message-template
        with:
          waba_id: rest.waba_id
          name: rest.name
          hsm_id: rest.hsm_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/message-templates/{message_template_id}
      name: message-template
      description: Individual message template management.
      operations:
      - method: POST
        name: update-message-template
        description: Updates an existing message template.
        call: whatsapp-business-mgmt.update-message-template
        with:
          message_template_id: rest.message_template_id
          components: rest.components
          category: rest.category
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/conversation-analytics
      name: conversation-analytics
      description: Conversation analytics and reporting.
      operations:
      - method: GET
        name: get-conversation-analytics
        description: Retrieves conversation analytics.
        call: whatsapp-business-mgmt.get-conversation-analytics
        with:
          waba_id: rest.waba_id
          start: rest.start
          end: rest.end
          granularity: rest.granularity
          phone_numbers: rest.phone_numbers
          metric_types: rest.metric_types
          conversation_categories: rest.conversation_categories
          dimensions: rest.dimensions
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/template-analytics
      name: template-analytics
      description: Template performance analytics.
      operations:
      - method: GET
        name: get-template-analytics
        description: Retrieves template analytics.
        call: whatsapp-business-mgmt.get-template-analytics
        with:
          waba_id: rest.waba_id
          start: rest.start
          end: rest.end
          granularity: rest.granularity
          template_ids: rest.template_ids
          metric_types: rest.metric_types
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9092
    namespace: whatsapp-templates-mcp
    transport: http
    description: MCP server for AI-assisted WhatsApp template management and analytics.
    tools:
    - name: list-message-templates
      description: Lists all message templates for a WhatsApp Business Account. Supports filtering by name, language, status,
        and category.
      hints:
        readOnly: true
        idempotent: true
      call: whatsapp-business-mgmt.list-message-templates
      with:
        waba_id: tools.waba_id
        fields: tools.fields
        limit: tools.limit
        after: tools.after
        before: tools.before
        name: tools.name
        language: tools.language
        status: tools.status
        category: tools.category
      outputParameters:
      - type: object
        mapping: $.
    - name: create-message-template
      description: Creates a new message template. Templates must be approved by Meta before use.
      hints:
        readOnly: false
        destructive: false
      call: whatsapp-business-mgmt.create-message-template
      with:
        waba_id: tools.waba_id
        name: tools.name
        language: tools.language
        category: tools.category
        components: tools.components
      outputParameters:
      - type: object
        mapping: $.
    - name: update-message-template
      description: Updates an existing message template. Only APPROVED or PAUSED templates can be edited. Edits re-trigger
        the approval process.
      hints:
        readOnly: false
        idempotent: true
      call: whatsapp-business-mgmt.update-message-template
      with:
        message_template_id: tools.message_template_id
        components: tools.components
        category: tools.category
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-message-template
      description: Deletes a message template. Deleting by name removes all language variants.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: whatsapp-business-mgmt.delete-message-template
      with:
        waba_id: tools.waba_id
        name: tools.name
        hsm_id: tools.hsm_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-conversation-analytics
      description: Retrieves conversation analytics for a WABA with configurable time range, granularity, and dimensional
        breakdown.
      hints:
        readOnly: true
        idempotent: true
      call: whatsapp-business-mgmt.get-conversation-analytics
      with:
        waba_id: tools.waba_id
        start: tools.start
        end: tools.end
        granularity: tools.granularity
        phone_numbers: tools.phone_numbers
        metric_types: tools.metric_types
        conversation_categories: tools.conversation_categories
        dimensions: tools.dimensions
      outputParameters:
      - type: object
        mapping: $.
    - name: get-template-analytics
      description: Retrieves analytics for specific message templates including sent, delivered, read, clicked, and cost metrics.
      hints:
        readOnly: true
        idempotent: true
      call: whatsapp-business-mgmt.get-template-analytics
      with:
        waba_id: tools.waba_id
        start: tools.start
        end: tools.end
        granularity: tools.granularity
        template_ids: tools.template_ids
        metric_types: tools.metric_types
      outputParameters:
      - type: object
        mapping: $.
