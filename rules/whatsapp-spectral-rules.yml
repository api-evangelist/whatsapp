rules:
  info-title-required:
    description: API title must be present.
    severity: error
    given: $.info
    then: {field: title, function: truthy}
  info-title-format:
    description: Title should start with "WhatsApp".
    severity: warn
    given: $.info.title
    then: {function: pattern, functionOptions: {match: "^WhatsApp "}}
  info-description-required:
    description: API description must be present.
    severity: error
    given: $.info
    then: {field: description, function: truthy}
  info-version-required:
    description: API version must be specified.
    severity: error
    given: $.info
    then: {field: version, function: truthy}
  servers-defined:
    description: At least one server must be defined.
    severity: error
    given: $
    then: {field: servers, function: truthy}
  servers-https-only:
    description: Server URLs must use HTTPS.
    severity: error
    given: $.servers[*].url
    then: {function: pattern, functionOptions: {match: "^https://"}}
  paths-no-trailing-slash:
    description: Paths must not have trailing slashes.
    severity: error
    given: $.paths
    then: {field: "@key", function: pattern, functionOptions: {notMatch: "\\/$"}}
  operation-description-required:
    description: Every operation must have a description.
    severity: error
    given: $.paths[*][get,post,put,patch,delete]
    then: {field: description, function: truthy}
  operation-operationid-required:
    description: Every operation must have an operationId.
    severity: error
    given: $.paths[*][get,post,put,patch,delete]
    then: {field: operationId, function: truthy}
  operation-operationid-unique:
    description: Operation IDs must be unique.
    severity: error
    given: $
    then: {function: oasOpId}
  tags-title-case:
    description: Tag names should use Title Case.
    severity: info
    given: $.tags[*].name
    then: {function: pattern, functionOptions: {match: "^[A-Z][a-zA-Z0-9]*(\\s[A-Za-z0-9]+)*$"}}
  parameter-description-required:
    description: All parameters must have a description.
    severity: error
    given: $.paths[*][get,post,put,patch,delete].parameters[*]
    then: {field: description, function: truthy}
  response-success-required:
    description: Every operation must define a success response.
    severity: error
    given: $.paths[*][get,post,put,patch,delete].responses
    then: {function: schema, functionOptions: {schema: {anyOf: [{required: ["200"]}, {required: ["201"]}, {required: ["204"]}]}}}
  response-description-required:
    description: All responses must have a description.
    severity: error
    given: $.paths[*][get,post,put,patch,delete].responses[*]
    then: {field: description, function: truthy}
  security-schemes-defined:
    description: Security schemes should be defined.
    severity: warn
    given: $.components
    then: {field: securitySchemes, function: truthy}
  get-no-request-body:
    description: GET operations must not have a request body.
    severity: error
    given: $.paths[*].get
    then: {field: requestBody, function: falsy}
  no-empty-descriptions:
    description: Descriptions must not be empty.
    severity: error
    given: "$..description"
    then: {function: truthy}
